<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รวม APP พิเศษปาริฉัตร</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d9488"> 
  <link rel="icon" type="image/png" href="./icon.png">
  <link rel="apple-touch-icon" href="./icon.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Prompt', sans-serif; }
    
    .app-card { 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
    }
    .app-card:hover { 
      transform: translateY(-5px) scale(1.03); 
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); 
    }
    
    .truncate-2-lines { 
      display: -webkit-box; 
      -webkit-line-clamp: 2; 
      -webkit-box-orient: vertical; 
      overflow: hidden; 
    }
    
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-teal-50 text-gray-800 min-h-screen pb-10">

  <header class="bg-gradient-to-r from-teal-700 via-teal-600 to-green-600 text-white shadow-lg sticky top-0 z-40">
    <div class="max-w-[95%] 2xl:max-w-screen-2xl mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <img src="./icon.png" alt="Logo" class="w-12 h-12 rounded-xl shadow-sm bg-white p-0.5 object-cover">
        <h1 class="text-xl md:text-2xl font-semibold drop-shadow-md">รวม APP พิเศษปาริฉัตร</h1>
      </div>
      <button id="adminToggleBtn" class="text-teal-100 hover:text-white transition transform hover:scale-110" aria-label="Toggle Admin Panel">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </button>
    </div>
  </header>

  <div class="max-w-[95%] 2xl:max-w-screen-2xl mx-auto px-4 mt-8">
    <div class="relative">
      <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
        <svg class="h-6 w-6 text-teal-500" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
        </svg>
      </div>
      <input type="text" id="searchInput" placeholder="ค้นหาชื่อแอป..." class="block w-full pl-12 pr-4 py-4 border-2 border-teal-200 rounded-2xl text-lg leading-5 bg-white placeholder-gray-400 focus:outline-none focus:ring-0 focus:border-teal-500 shadow-sm transition">
    </div>
  </div>

  <div class="max-w-[95%] 2xl:max-w-screen-2xl mx-auto px-4 mt-4">
    <div class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide" id="categoryFilter">
      <button onclick="filterCategory('ทั้งหมด')" class="cat-btn bg-teal-600 text-white px-5 py-2 rounded-full text-sm md:text-base font-medium whitespace-nowrap shadow-sm transition">ทั้งหมด</button>
      <button onclick="filterCategory('ตรวจสอบความพร้อมใช้')" class="cat-btn bg-white text-teal-700 border border-teal-200 px-5 py-2 rounded-full text-sm md:text-base font-medium whitespace-nowrap hover:bg-teal-50 transition">ตรวจสอบความพร้อมใช้</button>
      <button onclick="filterCategory('งานพยาบาล')" class="cat-btn bg-white text-teal-700 border border-teal-200 px-5 py-2 rounded-full text-sm md:text-base font-medium whitespace-nowrap hover:bg-teal-50 transition">งานพยาบาล</button>
      <button onclick="filterCategory('ผู้ช่วยเหลือคนไข้')" class="cat-btn bg-white text-teal-700 border border-teal-200 px-5 py-2 rounded-full text-sm md:text-base font-medium whitespace-nowrap hover:bg-teal-50 transition">ผู้ช่วยเหลือคนไข้</button>
      <button onclick="filterCategory('อื่นๆ ทั่วไป')" class="cat-btn bg-white text-teal-700 border border-teal-200 px-5 py-2 rounded-full text-sm md:text-base font-medium whitespace-nowrap hover:bg-teal-50 transition">อื่นๆ ทั่วไป</button>
    </div>
  </div>

  <div id="adminPanel" class="max-w-[95%] 2xl:max-w-screen-2xl mx-auto px-4 mt-6 hidden">
    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-md border-2 border-teal-100">
      <h2 class="text-xl font-semibold text-teal-700 mb-6">✨ เพิ่มแอปใหม่ (Admin Mode)</h2>
      <form id="addAppForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อแอป</label>
          <input type="text" id="appName" required class="block w-full border border-gray-300 rounded-xl shadow-sm py-3 px-4 focus:outline-none focus:ring-teal-500 focus:border-teal-500 text-base">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">หมวดหมู่</label>
          <select id="appCategory" required class="block w-full border border-gray-300 rounded-xl shadow-sm py-3 px-4 focus:outline-none focus:ring-teal-500 focus:border-teal-500 text-base bg-white">
            <option value="ตรวจสอบความพร้อมใช้">ตรวจสอบความพร้อมใช้</option>
            <option value="งานพยาบาล">งานพยาบาล</option>
            <option value="ผู้ช่วยเหลือคนไข้">ผู้ช่วยเหลือคนไข้</option>
            <option value="อื่นๆ ทั่วไป">อื่นๆ ทั่วไป</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Link ไอคอน (URL รูปภาพ)</label>
          <input type="url" id="appIcon" required class="block w-full border border-gray-300 rounded-xl shadow-sm py-3 px-4 focus:outline-none focus:ring-teal-500 focus:border-teal-500 text-base">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Link App (URL ปลายทาง)</label>
          <input type="url" id="appLink" required class="block w-full border border-gray-300 rounded-xl shadow-sm py-3 px-4 focus:outline-none focus:ring-teal-500 focus:border-teal-500 text-base">
        </div>
        <div class="md:col-span-2 flex justify-end mt-2">
          <button type="submit" id="submitBtn" class="bg-teal-600 border border-transparent rounded-xl shadow-sm py-3 px-8 inline-flex justify-center text-base font-semibold text-white hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 transition">
            บันทึกข้อมูล
          </button>
        </div>
      </form>
    </div>
  </div>

  <div id="loadingIndicator" class="flex justify-center items-center mt-16">
    <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-teal-600"></div>
  </div>

  <div id="appContainer" class="max-w-[95%] 2xl:max-w-screen-2xl mx-auto px-4 mt-10 hidden">
    
    <div class="mb-10 category-section" data-cat="ตรวจสอบความพร้อมใช้">
      <h3 class="text-xl md:text-2xl font-semibold text-gray-800 mb-6 border-l-4 border-teal-500 pl-3">ตรวจสอบความพร้อมใช้</h3>
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 2xl:grid-cols-6 gap-5 md:gap-6 lg:gap-8 app-grid" id="grid-cat-1"></div>
    </div>
    
    <div class="mb-10 category-section" data-cat="งานพยาบาล">
      <h3 class="text-xl md:text-2xl font-semibold text-gray-800 mb-6 border-l-4 border-green-500 pl-3">งานพยาบาล</h3>
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 2xl:grid-cols-6 gap-5 md:gap-6 lg:gap-8 app-grid" id="grid-cat-2"></div>
    </div>

    <div class="mb-10 category-section" data-cat="ผู้ช่วยเหลือคนไข้">
      <h3 class="text-xl md:text-2xl font-semibold text-gray-800 mb-6 border-l-4 border-purple-500 pl-3">ผู้ช่วยเหลือคนไข้</h3>
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 2xl:grid-cols-6 gap-5 md:gap-6 lg:gap-8 app-grid" id="grid-cat-3"></div>
    </div>

    <div class="mb-10 category-section" data-cat="อื่นๆ ทั่วไป">
      <h3 class="text-xl md:text-2xl font-semibold text-gray-800 mb-6 border-l-4 border-gray-500 pl-3">อื่นๆ ทั่วไป</h3>
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 2xl:grid-cols-6 gap-5 md:gap-6 lg:gap-8 app-grid" id="grid-cat-4"></div>
    </div>
    
  </div>

  <script src="script.js"></script>
</body>
</html>
